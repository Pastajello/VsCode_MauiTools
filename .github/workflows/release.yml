name: Build & Release VS Code Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      package:
        description: "Create VSIX package"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # Set version from tag (only on tag push)
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          CURRENT=$(node -p "require('./package.json').version")

          if [ "$VERSION" != "$CURRENT" ]; then
            npm version $VERSION --no-git-tag-version
          else
            echo "Version already set, skipping"
          fi

      - run: npm run build

      # Package VSIX
      - name: Package extension
        if: startsWith(github.ref, 'refs/tags/') || inputs.package == 'true'
        run: npx vsce package --no-dependencies

      # Upload artifact
      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: "*.vsix"

      # Create GitHub Release (tag only)
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: "*.vsix"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 🔥 Publish to VS Code Marketplace
      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/')
        run: npx vsce publish -p $VSCE_PAT --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.MARKETPLACE_PAT }}
